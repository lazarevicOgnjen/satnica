name: bot

on:
  workflow_dispatch: 
    inputs:
      url_to_scrape:
        description: 'url'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Execute script
      env:
        url: ${{ github.event.inpputs.url_to_scrape }}
      run: python main.py

    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add subjects.md
        git commit -m "Auto-update scraped content [skip ci]" || echo "No changes to commit"
        git push
